name: Selenium Automated UI Testing

on:
  push:
    branches: [ "**" ] # run on all branches
  pull_request:
    branches: [ "**" ]

jobs:
  selenium-tests:
    name: Run Selenium UI Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium pytest pytest-html

    - name: Start Local Web Server
      run: |
        python -m http.server 8000 &
        sleep 3 # Allow the server to bind and start serving

    - name: Run Selenium Tests
      run: |
        pytest test_app.py --html=report.html --self-contained-html

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: focus-eye-test-report
        path: report.html
        retention-days: 30
